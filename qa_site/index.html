<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOTBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="shell">
      <header class="hero">
        <p class="kicker">Local RAG Workspace</p>
        <div class="hero-image-wrap">
          <img
            class="hero-image"
            src="./assets/not-observatory.jpg"
            alt="Nordic Optical Telescope above clouds"
          />
          <img class="brand-logo overlay-top-left" src="./assets/not-logo.jpg" alt="NOT logo" />
          <img class="notbot-logo overlay-bottom-left" src="./assets/notbot.png" alt="NOTBot logo" />
        </div>
      </header>

      <section class="ask-panel card">
        <label class="field">
          <span>Question</span>
          <textarea id="questionInput" rows="4" placeholder="e.g. What are the spectroscopy setup constraints for ALFOSC?"></textarea>
        </label>

        <div class="actions">
          <button id="askBtn" class="btn-primary">Ask Question</button>
          <button id="clearBtn" class="btn-ghost">Clear Session</button>
          <span id="status" class="status">Idle</span>
        </div>
      </section>

      <section id="resultPanel" class="result-grid hidden">
        <article class="card answer-card">
          <h2>Answer</h2>
          <p id="answerText" class="answer-text"></p>
          <div id="metrics" class="metric-grid"></div>
        </article>

        <article class="card sources-card">
          <div class="sources-head">
            <h2>Sources</h2>
            <span id="sourceCount" class="pill">0 chunks</span>
          </div>
          <div id="sourcesList" class="sources-list"></div>
        </article>
      </section>

      <section class="card history-card">
        <div class="sources-head">
          <h2>Session History</h2>
          <span id="historyCount" class="pill">0 items</span>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <section class="card">
        <div class="row row-top">
          <label class="field">
            <span>API Base URL</span>
            <input id="apiBaseUrl" type="text" value="http://127.0.0.1:8000" />
          </label>
          <label class="field field-sm">
            <span>Language</span>
            <select id="language">
              <option value="en" selected>English</option>
              <option value="de">Deutsch</option>
            </select>
          </label>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
